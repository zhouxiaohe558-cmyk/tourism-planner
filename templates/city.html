<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>漫游中国 · 热门城市灵感集 | 半透明背景意境</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', '微软雅黑', 'PingFang SC', Roboto, sans-serif;
    }

    /* ========= 全局背景 + 半透明图片层 (透明度50%) ========= */
    body {
      background: #fef7ef;
      padding: 50px 24px 80px;
      position: relative;
      min-height: 100vh;
    }

    /* ✅ 半透明背景图 (透明度 50%) */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://ts1.tc.mm.bing.net/th/id/R-C.2ea4c5b998603f8c2063c80f8f9928b5?rik=3Ks8xULgcFIU2Q&riu=http%3a%2f%2fimg.xintp.com%2f2019%2f12%2f10%2fta0ybcui0lh.jpg&ehk=fBDxTTIr1rLMFa4DcH%2f2db4qQTMEAvmS4GL%2faUZwDd0%3d&risl=&pid=ImgRaw&r=0");
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      background-attachment: fixed;
      opacity: 0.5;
      z-index: 0;
      pointer-events: none;
    }

    /* 优雅噪点叠加层 */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(255,215,170,0.08) 2%, transparent 2.5%);
      background-size: 35px 35px;
      pointer-events: none;
      z-index: 1;
    }

    /* 主要内容区浮在背景之上 */
    .wrapper {
      max-width: 1300px;
      margin: 0 auto;
      position: relative;
      z-index: 5;
    }

    /* 标题区设计 */
    .title-section {
      text-align: center;
      margin-bottom: 55px;
      animation: fadeInDown 0.7s ease;
      backdrop-filter: blur(2px);
    }
    .main-title {
      font-size: 3.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #B5450C, #E07A2C, #F6AD55);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .sub-title {
      font-size: 1.1rem;
      color: #AD6B35;
      margin-top: 14px;
      font-weight: 500;
      background: rgba(255,245,230,0.7);
      display: inline-block;
      padding: 6px 24px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }

    /* 城市卡片网格 */
    .city-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
      margin-bottom: 30px;
    }

    .city-card {
      background: rgba(255, 252, 245, 0.92);
      backdrop-filter: blur(6px);
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 20px 32px -12px rgba(0, 0, 0, 0.18);
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      border: 1px solid rgba(255, 215, 160, 0.6);
    }

    .city-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 250, 0.98);
      box-shadow: 0 30px 45px -12px rgba(0, 0, 0, 0.28);
      border-color: #FFC085;
    }

    .card-img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .city-card:hover .card-img {
      transform: scale(1.02);
    }

    .card-content {
      padding: 24px 20px 28px;
      text-align: center;
    }

    .city-name {
      font-size: 1.9rem;
      font-weight: 800;
      color: #4E2C1A;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .city-tagline {
      font-size: 0.85rem;
      color: #C4622A;
      font-weight: 600;
      background: #FFF0E0;
      display: inline-block;
      padding: 4px 18px;
      border-radius: 40px;
      margin-top: 6px;
    }

    /* 弹窗轻奢杂志风格 */
    .modal-mask {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-container {
      width: 90%;
      max-width: 1150px;
      background: #FFFCF5;
      border-radius: 48px;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 40px 70px rgba(0, 0, 0, 0.4);
      animation: scaleIn 0.25s ease-out;
      position: relative;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96);}
      to { opacity: 1; transform: scale(1);}
    }

    .modal-header {
      position: sticky;
      top: 0;
      background: #FFFCF5;
      padding: 26px 36px 18px;
      border-bottom: 2px solid #FFDFB3;
      border-radius: 48px 48px 0 0;
      z-index: 12;
    }

    .modal-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: #B85322;
      margin: 0;
    }
    .modal-close {
      position: absolute;
      top: 26px;
      right: 32px;
      font-size: 32px;
      font-weight: 400;
      color: #B87A4A;
      cursor: pointer;
      transition: 0.2s;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 60px;
      background: #F3E9DE;
    }
    .modal-close:hover {
      background: #FF7E5E;
      color: white;
      transform: rotate(90deg);
    }

    .modal-body {
      padding: 24px 36px 48px;
    }

    /* 板块 */
    .section-block {
      margin-bottom: 52px;
    }
    .block-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 28px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border-left: 6px solid #F7A35C;
      padding-left: 18px;
      color: #3F2A1C;
    }
    .block-title span {
      font-size: 1.8rem;
    }

    /* 双列瀑布流卡片 */
    .card-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    .info-card {
      background: #FFFFFF;
      border-radius: 32px;
      overflow: hidden;
      transition: 0.25s;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
      border: 1px solid #FCE1BF;
    }
    .info-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.18);
      border-color: #F7BA7A;
    }
    .card-media {
      width: 100%;
      height: 190px;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .info-card:hover .card-media {
      transform: scale(1.02);
    }
    .card-text {
      padding: 18px 20px 24px;
    }
    .item-name {
      font-size: 1.35rem;
      font-weight: 700;
      color: #874E2C;
      margin-bottom: 8px;
    }
    .item-desc {
      font-size: 0.9rem;
      color: #6F5A48;
      line-height: 1.48;
    }

    .footer-note {
      text-align: center;
      margin-top: 60px;
      color: #C78F58;
      font-size: 0.85rem;
      background: rgba(255, 245, 230, 0.7);
      backdrop-filter: blur(4px);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 8px 24px;
      border-radius: 60px;
    }

    /* ========= 右下角浮动按钮 - 页面切换，进入精选路线 ========= */
    .floating-route-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 1050;
      background: linear-gradient(135deg, #FFA62E, #FF7A00);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.25);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: none;
      outline: none;
      backdrop-filter: blur(4px);
    }
    .floating-route-btn:hover {
      transform: scale(1.08);
      background: linear-gradient(135deg, #FFB84D, #FF8C1A);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.3);
    }
    .floating-route-btn:active {
      transform: scale(0.96);
    }
    .floating-route-btn span {
      font-size: 28px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    /* 小屏幕适配 */
    @media (max-width: 680px) {
      .floating-route-btn {
        width: 54px;
        height: 54px;
        bottom: 20px;
        right: 20px;
      }
      .floating-route-btn span {
        font-size: 24px;
      }
      .main-title { font-size: 2.3rem; }
      .modal-body { padding: 20px; }
      .block-title { font-size: 1.5rem; }
      .modal-title { font-size: 1.7rem; }
      .city-name { font-size: 1.6rem; }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-25px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

  // 渲染城市卡片
  const cityGrid = document.getElementById('cityGrid');
  function renderCityCards() {
    cityGrid.innerHTML = '';
    citiesData.forEach(city => {
      const card = document.createElement('div');
      card.className = 'city-card';
      card.setAttribute('data-id', city.id);
      card.innerHTML = `
        <img class="card-img" src="${city.coverImg}" alt="${city.name}" loading="lazy" onerror="this.src='https://picsum.photos/id/104/400/300'">
        <div class="card-content">
          <div class="city-name">${city.name}</div>
          <div class="city-tagline">${city.tagline}</div>
        </div>
      `;
      card.addEventListener('click', () => openCityModal(city.id));
      cityGrid.appendChild(card);
    });
  }

  // 获取城市完整数据
  function getCityById(id) {
    return citiesData.find(c => c.id === id);
  }

  // 弹窗元素
  const modalMask = document.getElementById('modalMask');
  const modalTitle = document.getElementById('modalTitle');
  const spotList = document.getElementById('spotList');
  const foodList = document.getElementById('foodList');
  const closeBtn = document.getElementById('modalCloseBtn');

  function openCityModal(cityId) {
    const city = getCityById(cityId);
    if (!city) return;
    modalTitle.innerText = `${city.name} · 旅行灵感册`;

    // 渲染景点
    spotList.innerHTML = '';
    city.spots.forEach(spot => {
      const item = document.createElement('div');
      item.className = 'info-card';
      item.innerHTML = `
        <img class="card-media" src="${spot.img}" alt="${spot.name}" loading="lazy" onerror="this.src='https://picsum.photos/id/29/400/280'">
        <div class="card-text">
          <div class="item-name">📍 ${spot.name}</div>
          <div class="item-desc">${spot.desc}</div>
        </div>
      `;
      spotList.appendChild(item);
    });

    // 渲染美食
    foodList.innerHTML = '';
    city.foods.forEach(food => {
      const item = document.createElement('div');
      item.className = 'info-card';
      item.innerHTML = `
        <img class="card-media" src="${food.img}" alt="${food.name}" loading="lazy" onerror="this.src='https://picsum.photos/id/127/400/280'">
        <div class="card-text">
          <div class="item-name">🍜 ${food.name}</div>
          <div class="item-desc">${food.desc}</div>
        </div>
      `;
      foodList.appendChild(item);
    });

    modalMask.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modalMask.style.display = 'none';
    document.body.style.overflow = '';
  }

  closeBtn.addEventListener('click', closeModal);
  modalMask.addEventListener('click', (e) => {
    if (e.target === modalMask) closeModal();
  });

// ✅ 右下角按钮：页面切换，跳转到精选路线页面
const gotoRouteBtn = document.getElementById('gotoRouteBtn');
if (gotoRouteBtn) {
    gotoRouteBtn.addEventListener('click', () => {
        gotoRouteBtn.style.transform = 'scale(0.92)';
        setTimeout(() => {
            // 跳转到精选路线页面（文件名带空格需要用 %20 编码）
            window.location.href = '/route';
        }, 100);
        setTimeout(() => {
            gotoRouteBtn.style.transform = '';
        }, 200);
    });
}

  // 启动渲染
  renderCityCards();

  // 图片加载容错
  window.addEventListener('load', () => {
    const backupImg = 'https://picsum.photos/id/13/400/280';
    const allImages = document.querySelectorAll('.card-img, .card-media');
    allImages.forEach(img => {
      img.addEventListener('error', function() {
        this.src = backupImg;
      });
    });
  });
</script>
