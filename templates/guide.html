        const AMAP_WEB_KEY = '09f130b540b9eddb606f3bd9b21ffb73';
        const travelMinutesCache = {};

        function toTimeText(totalMinutes) {
            const hour = Math.floor(totalMinutes / 60);
            const minute = totalMinutes % 60;
            return `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
        }

        function roundToHalfHour(hours) {
            return Math.max(1, Math.round(hours * 2) / 2);
        }

        function parseTicketPrice(ticket) {
            if (!ticket) return 0;
            const numbers = String(ticket).match(/\d+(\.\d+)?/g);
            if (!numbers || !numbers.length) return 0;
            return Number(numbers[0]) || 0;
        }

        function getTypeWeight(spot) {
            const text = `${spot.name || ''}${spot.description || ''}`;
            let score = 2.0;
            if (/山|湖|沟|草原|海|景区|长城|瀑布|古城/.test(text)) score += 0.8;
            if (/博物院|故宫|石窟|大佛|宫|遗产|祠|古街/.test(text)) score += 0.4;
            if (/乐园|基地|港|塔/.test(text)) score += 0.2;
            return score;
        }

        function getOpenTimeWeight(spot) {
            const text = String(spot.openTime || '');
            if (!text) return 0;
            if (text.includes('全天')) return 0.3;
            const times = text.match(/(\d{1,2}):(\d{2})/g);
            if (!times || times.length < 2) return 0;
            const [startH, startM] = times[0].split(':').map(Number);
            const [endH, endM] = times[1].split(':').map(Number);
            const openMinutes = (endH * 60 + endM) - (startH * 60 + startM);
            if (openMinutes >= 600) return 0.4;
            if (openMinutes <= 480) return -0.2;
            return 0.1;
        }

        function getRecommendHoursBySpot(spot, totalCount) {
            let hours = getTypeWeight(spot);
            const ticketPrice = parseTicketPrice(spot.ticket);
            if (ticketPrice >= 150) hours += 0.5;
            else if (ticketPrice >= 80) hours += 0.2;
            hours += getOpenTimeWeight(spot);

            // 景点多时自动压缩单点停留，保证行程可执行
            if (totalCount >= 6) hours -= 0.4;
            else if (totalCount >= 4) hours -= 0.2;

            return roundToHalfHour(hours);
        }

        function estimateMoveMinutes(currentSpot, nextSpot) {
            const sameCity = currentSpot.city === nextSpot.city && currentSpot.province === nextSpot.province;
            const sameProvince = currentSpot.province === nextSpot.province;
            if (sameCity) return 35;
            if (sameProvince) return 90;
            return 180;
        }

        function buildCacheKey(currentSpot, nextSpot) {
            return `${currentSpot.lng},${currentSpot.lat}->${nextSpot.lng},${nextSpot.lat}`;
        }

        async function getTravelMinutesByRoad(currentSpot, nextSpot) {
            const cacheKey = buildCacheKey(currentSpot, nextSpot);
            if (travelMinutesCache[cacheKey]) {
                return travelMinutesCache[cacheKey];
            }
            try {
                const origin = `${currentSpot.lng},${currentSpot.lat}`;
                const destination = `${nextSpot.lng},${nextSpot.lat}`;
                const apiUrl = `https://restapi.amap.com/v3/direction/driving?origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&strategy=0&extensions=base&key=${AMAP_WEB_KEY}`;
                const response = await fetch(apiUrl);
                const data = await response.json();
                const seconds = Number(data?.route?.paths?.[0]?.duration || 0);
                if (seconds > 0) {
                    const minutes = Math.max(10, Math.round(seconds / 60));
                    travelMinutesCache[cacheKey] = minutes;
                    return minutes;
                }
            } catch (error) {
                // fallback below
            }
            const fallback = estimateMoveMinutes(currentSpot, nextSpot);
            travelMinutesCache[cacheKey] = fallback;
            return fallback;
        }

        async function buildMoveMinutesList(spots) {
            if (!spots || spots.length < 2) return [];
            const tasks = [];
            for (let i = 0; i < spots.length - 1; i++) {
                tasks.push(getTravelMinutesByRoad(spots[i], spots[i + 1]));
            }
            return Promise.all(tasks);
        }

        // 生成一日游时间安排（含每个景点到达时间和推荐游玩时长）
        async function generateItinerary(spots) {
            if (!spots || spots.length === 0) {
                document.getElementById('timeline-content').innerHTML = `
                    <div class="empty-state">
                        <h3>🎯 未选择景点</h3>
                        <p>请先在路线规划页面选择景点生成路线</p>
                    </div>
                `;
                return;
            }

            const timeSlots = [];
            let currentMinutes = 8 * 60;
            const moveMinutesList = await buildMoveMinutesList(spots);
            timeSlots.push({
                time: `${toTimeText(currentMinutes)} - ${toTimeText(currentMinutes + 30)}`,
                activity: '早餐',
                description: '享用当地特色早餐，为一天行程补充体力'
            });
            currentMinutes += 30;

            spots.forEach((spot, index) => {
                const arrivalTime = toTimeText(currentMinutes);
                const recommendHours = getRecommendHoursBySpot(spot, spots.length);
                const stayMinutes = Math.round(recommendHours * 60);
                const leaveTime = toTimeText(currentMinutes + stayMinutes);
                timeSlots.push({
                    time: `${arrivalTime} - ${leaveTime}`,
                    activity: `游览 ${spot.name}`,
                    description: `预计 ${arrivalTime} 到达，推荐游玩 ${recommendHours} 小时。${spot.description || '探索这个美丽的景点'}`
                });

                currentMinutes += stayMinutes;

                if (index < spots.length - 1) {
                    const nextSpot = spots[index + 1];
                    const moveMinutes = moveMinutesList[index] || estimateMoveMinutes(spot, nextSpot);
                    const departTime = toTimeText(currentMinutes);
                    const reachTime = toTimeText(currentMinutes + moveMinutes);
                    const crossCityNote = (spot.city === nextSpot.city && spot.province === nextSpot.province)
                        ? '同城换点'
                        : `${spot.city} -> ${nextSpot.city}`;
                    timeSlots.push({
                        time: `${departTime} - ${reachTime}`,
                        activity: '前往下一个景点',
                        description: `${crossCityNote}，建议预留 ${moveMinutes} 分钟交通时间`
                    });
                    currentMinutes += moveMinutes;
                }
            });

            if (currentMinutes < 12 * 60) {
                currentMinutes = 12 * 60;
            }
            if (currentMinutes >= 12 * 60 && currentMinutes <= 14 * 60) {
                timeSlots.push({
                    time: `${toTimeText(currentMinutes)} - ${toTimeText(currentMinutes + 60)}`,
                    activity: '午餐',
                    description: '品尝当地特色美食'
                });
                currentMinutes += 60;
            }

            timeSlots.push({
                time: `${toTimeText(currentMinutes)} - ${toTimeText(currentMinutes + 60)}`,
                activity: '返程',
                description: '结束一天的愉快行程，返回住宿地点'
            });

            // 渲染时间线
            const timelineContent = document.getElementById('timeline-content');
            timelineContent.innerHTML = timeSlots.map(item => `
                <div class="timeline-item">
                    <div class="time-slot">${item.time}</div>
                    <div class="activity">${item.activity}</div>
                    <div class="description">${item.description}</div>
                </div>
            `).join('');
        }

        // 从URL获取景点ID并生成攻略
        async function loadGuideFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const spotIdsParam = urlParams.get('spotIds');

            if (spotIdsParam) {
                const ids = spotIdsParam.split(',').map(id => parseInt(id)).filter(id => !isNaN(id));
                if (ids.length > 0) {
                    const selectedSpots = FULL_SPOTS_DB.filter(spot => ids.includes(spot.id));
                    await generateItinerary(selectedSpots);
                } else {
                    await generateItinerary([]);
                }
            } else {
                await generateItinerary([]);
            }
        }

        // 页面加载完成后生成攻略
        window.onload = () => {
            loadGuideFromURL();
        };
    </script>
</body>
