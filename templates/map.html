<script>
/**
 * 启用页面内调试面板（用于定位“地图无法拖动/缩放”的原因）。
 * - 按住 Shift 并点击页面任意位置：切换显示/隐藏
 * @returns {void}
 */
function setupDebugPanel() {
    const panel = document.getElementById('debugPanel');
    if (!panel) return;

    const state = {
        enabled: false,
        lastEvent: '',
        lastTarget: ''
    };

    /**
     * @param {MouseEvent} e
     */
    function update(e) {
        if (!state.enabled) return;
        try {
            const el = document.elementFromPoint(e.clientX, e.clientY);
            const desc = el
                ? `${String(el.tagName || '').toLowerCase()}${el.id ? `#${el.id}` : ''}${el.className ? `.${String(el.className).replace(/\s+/g, '.')}` : ''}`
                : '(null)';
            state.lastEvent = `${e.type} @ (${e.clientX},${e.clientY})`;
            state.lastTarget = desc;
            const mapState = (typeof map !== 'undefined' && map) ? 'ok' : 'null';
            const modeState = (typeof currentRouteMode !== 'undefined') ? currentRouteMode : 'unknown';
            panel.textContent =
                `调试：Shift+点击切换\n` +
                `事件: ${state.lastEvent}\n` +
                `命中元素: ${state.lastTarget}\n` +
                `AMap: ${typeof window.AMap}\n` +
                `map实例: ${mapState}\n` +
                `routeMode: ${modeState}`;
        } catch (error) {
            panel.textContent = `调试面板更新失败: ${error?.message || error}`;
        }
    }

    window.addEventListener('click', (e) => {
        if (e.shiftKey) {
            state.enabled = !state.enabled;
            panel.style.display = state.enabled ? 'block' : 'none';
            if (state.enabled) {
                panel.textContent = '调试面板已开启，移动鼠标/滚轮试试…';
            }
        }
    }, true);

    // 捕获阶段监听，判断事件是否被上层元素吃掉
    ['mousemove', 'mousedown', 'mouseup', 'wheel'].forEach(type => {
        window.addEventListener(type, update, { capture: true, passive: true });
    });

    // 错误捕获：如果高德内部报错，会直接显示出来
    window.addEventListener('error', (ev) => {
        if (!state.enabled) return;
        try {
            const msg = ev && ev.message ? ev.message : '未知脚本错误';
            // 跨域脚本的泛化错误（常见为 "Script error."）信息不足，避免覆盖诊断面板
            if (msg === 'Script error.' || msg === 'Script error') return;
            panel.style.display = 'block';
            state.enabled = true;
            panel.textContent = `脚本错误: ${msg}`;
        } catch (err) {
            panel.style.display = 'block';
            state.enabled = true;
            panel.textContent = '脚本错误: 无法解析错误信息';
        }
    });
    window.addEventListener('unhandledrejection', (ev) => {
        if (!state.enabled) return;
        try {
            panel.style.display = 'block';
            state.enabled = true;
            const reason = ev && ev.reason ? ev.reason : ev;
            panel.textContent = `Promise错误: ${String(reason)}`;
        } catch (err) {
            panel.style.display = 'block';
            state.enabled = true;
            panel.textContent = 'Promise错误: 无法解析错误信息';
        }
    });
}

setupDebugPanel();

function enforceMapInteractions() {
    if (!map) return;
    try {
        map.setStatus({
            dragEnable: true,
            zoomEnable: true,
            doubleClickZoom: true,
            keyboardEnable: true,
            scrollWheel: true,
            touchZoom: true
        });
    } catch (error) {
        console.warn('setStatus failed', error);
    }
    const container = document.getElementById('map-container');
    if (container) {
        container.style.pointerEvents = 'auto';
        container.addEventListener('mouseenter', () => {
            try {
                map.setStatus({ dragEnable: true, zoomEnable: true, scrollWheel: true, touchZoom: true });
            } catch (error) {
                // ignore
            }
        });
    }
}

function installManualMapInteractionFallback() {
    if (!map) return;
    if (window.__MANUAL_MAP_INTERACTION_INSTALLED__) return;
    window.__MANUAL_MAP_INTERACTION_INSTALLED__ = true;

    let dragging = false;
    let activePointerId = null;
    let lastX = 0;
    let lastY = 0;
    const statusEl = document.getElementById('interactionStatus');
    let wheelCount = 0;
    let dragCount = 0;

    function updateStatus(text) {
        if (!statusEl || !map) return;
        let zoom = '-';
        try {
            const z = map.getZoom ? Number(map.getZoom()) : NaN;
            zoom = Number.isFinite(z) ? z.toFixed(1) : '-';
        } catch (error) {
            zoom = '-';
        }
        statusEl.textContent = `手势兜底: 已启用 | zoom=${zoom} | wheel=${wheelCount} | drag=${dragCount} | ${text}`;
    }

    function isInMapArea(clientX, clientY) {
        const container = document.getElementById('map-container');
        if (!container) return false;
        const rect = container.getBoundingClientRect();
        return clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom;
    }

    function beginDrag(clientX, clientY, pointerId = null) {
        if (!isInMapArea(clientX, clientY) || !map) return;
        dragging = true;
        activePointerId = pointerId;
        dragCount += 1;
        lastX = clientX;
        lastY = clientY;
        updateStatus('drag开始');
    }

    function moveDrag(clientX, clientY, pointerId = null) {
        if (!dragging || !map) return;
        if (activePointerId !== null && pointerId !== null && pointerId !== activePointerId) return;
        try {
            const dx = clientX - lastX;
            const dy = clientY - lastY;
            lastX = clientX;
            lastY = clientY;
            map.panBy(-dx, -dy);
            updateStatus('drag移动中');
        } catch (error) {
            // ignore
        }
    }

    function endDrag() {
        dragging = false;
        activePointerId = null;
        updateStatus('drag结束');
    }

    window.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;
        beginDrag(e.clientX, e.clientY, e.pointerId);
    }, true);

    window.addEventListener('pointermove', (e) => {
        moveDrag(e.clientX, e.clientY, e.pointerId);
    }, true);

    window.addEventListener('pointerup', endDrag, true);
    window.addEventListener('pointercancel', endDrag, true);

    // 额外提供 mouse 事件兜底（部分 WebView 对 pointer 支持不稳定）
    window.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        beginDrag(e.clientX, e.clientY, null);
    }, true);
    window.addEventListener('mousemove', (e) => {
        moveDrag(e.clientX, e.clientY, null);
    }, true);
    window.addEventListener('mouseup', endDrag, true);

    window.addEventListener('wheel', (e) => {
        if (!map) return;
        if (!isInMapArea(e.clientX, e.clientY)) return;
        e.preventDefault();
        wheelCount += 1;
        try {
            if (e.deltaY > 0) {
                map.zoomOut();
            } else {
                map.zoomIn();
            }
            updateStatus('wheel触发zoomIn/zoomOut');
        } catch (error) {
            // ignore
        }
    }, { capture: true, passive: false });

    updateStatus('等待鼠标事件');
}

function rebindInteractionsForGeneratedRoute() {
    // 关键：专门用于“携带 spotIds 生成路线后”的地图，强制重绑一次交互逻辑
    window.__MANUAL_MAP_INTERACTION_INSTALLED__ = false;
    enforceMapInteractions();
    installManualMapInteractionFallback();
}

// 计算两点之间的欧氏距离（用于贪心排序）
function calcDistance(p1, p2) {
    const dx = p1.lng - p2.lng;
    const dy = p1.lat - p2.lat;
    return Math.sqrt(dx * dx + dy * dy);
}

// 🔥 最优路径规划核心: 贪心最近邻算法 (生成最优游览顺序)
function computeOptimalRoute(spots) {
    if (!spots.length) return [];
    if (spots.length === 1) return spots;
    let unvisited = [...spots];
    // 选择第一个点为起始点 (可优化为选择地理中心，但贪心从第一个开始)
    let route = [unvisited.shift()];
    while (unvisited.length > 0) {
        let last = route[route.length - 1];
        let nearestIdx = 0;
        let minDist = calcDistance(last, unvisited[0]);
        for (let i = 1; i < unvisited.length; i++) {
            let d = calcDistance(last, unvisited[i]);
            if (d < minDist) {
                minDist = d;
                nearestIdx = i;
            }
        }
        route.push(unvisited[nearestIdx]);
        unvisited.splice(nearestIdx, 1);
    }
    return route;
}

// 计算路线总里程 (直线距离累加，体现参考)
function calcTotalDistance(route) {
    let total = 0;
    for (let i = 0; i < route.length - 1; i++) {
        total += calcDistance(route[i], route[i+1]);
    }
    // 转换为近似公里 (经纬度1度约111km，粗略展示)
    const approxKm = total * 111;
    return Math.round(approxKm);
}

// 预估时间 (基于景点数量 + 距离因素)
function estimateTime(route, totalDistanceKm) {
    if (route.length === 0) return 0;
    let baseHours = route.length * 1.2;  // 每景点1.2小时基础游览
    let travelHours = totalDistanceKm / 55; // 假设平均速度55km/h
    return Math.ceil(baseHours + travelHours);
}

// 清除地图上所有标记和路线
function clearMapOverlays() {
    if (currentPolyline) {
        map.remove(currentPolyline);
        currentPolyline = null;
    }
    if (currentDrivingPolylines.length) {
        map.remove(currentDrivingPolylines);
        currentDrivingPolylines = [];
    }
    if (currentTransit) {
        try {
            currentTransit.clear();
        } catch (e) {
            // ignore
        }
        currentTransit = null;
    }
    if (currentMarkers.length) {
        map.remove(currentMarkers);
        currentMarkers = [];
    }
}

/**
 * 将景点数组转换为高德坐标点数组。
 * @param {Array<{lng:number,lat:number}>} spots
 * @returns {Array<[number, number]>}
 */
function toLngLatPairs(spots) {
    return (spots || [])
        .filter(s => typeof s?.lng === 'number' && typeof s?.lat === 'number')
        .map(s => [s.lng, s.lat]);
}

/**
 * 调用高德 Driving 规划路线并返回 polyline 路径点。
 * - 注意：高德 Driving 对途经点数量有限制，超出会自动分段规划。
 * @param {Array<{lng:number,lat:number}>} orderedSpots 已排序景点（起点→终点）
 * @returns {Promise<Array<Array<[number, number]>>>} 多段路径点集合
 */
async function planDrivingPaths(orderedSpots) {
    await ensureDrivingPlugin();

    const points = toLngLatPairs(orderedSpots);
    if (points.length < 2) return [];

    /** @type {AMap.Driving} */
    const driving = new AMap.Driving({
        // 不让 Driving 自动画线/打点，我们自己画，方便统一样式与编号 marker
        map: null,
        hideMarkers: true
    });

    // 高德常见限制：途经点数量不宜过多，这里用 16 作为保守上限（不含起终点）
    const MAX_WAYPOINTS = 16;
    const segments = [];
    let cursor = 0;

    while (cursor < points.length - 1) {
        const origin = points[cursor];
        // 每段最多包含：origin + (MAX_WAYPOINTS) + destination
        const destinationIdx = Math.min(cursor + MAX_WAYPOINTS + 1, points.length - 1);
        const destination = points[destinationIdx];
        const waypoints = points.slice(cursor + 1, destinationIdx);

        // eslint-disable-next-line no-await-in-loop
        const segmentPaths = await new Promise((resolve, reject) => {
            driving.search(
                origin,
                destination,
                { waypoints },
                (status, result) => {
                    if (status !== 'complete' || !result?.routes?.length) {
                        reject(new Error(`Driving 规划失败：${status}`));
                        return;
                    }
                    const route = result.routes[0];
                    const steps = route?.steps || [];
                    const path = [];
                    steps.forEach(step => {
                        const stepPath = step?.path || [];
                        stepPath.forEach(p => {
                            // p 是 AMap.LngLat
                            path.push([p.lng, p.lat]);
                        });
                    });
                    resolve(path.length ? [path] : []);
                }
            );
        });

        segments.push(...segmentPaths);
        cursor = destinationIdx;
    }

    return segments;
}

/**
 * 调用高德 Walking 规划路线并返回 polyline 路径点（分段）。
 * @param {Array<{lng:number,lat:number}>} orderedSpots
 * @returns {Promise<Array<Array<[number, number]>>>}
 */
async function planWalkingPaths(orderedSpots) {
    await ensureWalkingPlugin();

    const points = toLngLatPairs(orderedSpots);
    if (points.length < 2) return [];

    /** @type {AMap.Walking} */
    const walking = new AMap.Walking({
        map: null,
        hideMarkers: true
    });

    const segments = [];
    for (let i = 0; i < points.length - 1; i++) {
        // eslint-disable-next-line no-await-in-loop
        const segPaths = await new Promise((resolve, reject) => {
            walking.search(points[i], points[i + 1], (status, result) => {
                if (status !== 'complete' || !result?.routes?.length) {
                    reject(new Error(`Walking 规划失败：${status}`));
                    return;
                }
                const route = result.routes[0];
                const steps = route?.steps || [];
                const path = [];
                steps.forEach(step => {
                    const stepPath = step?.path || [];
                    stepPath.forEach(p => path.push([p.lng, p.lat]));
                });
                resolve(path.length ? [path] : []);
            });
        });
        segments.push(...segPaths);
    }
    return segments;
}

/**
 * 公交模式：使用 Transfer 直接在地图上绘制（高德内部渲染），并返回是否成功。
 * @param {Array<{lng:number,lat:number}>} orderedSpots
 * @returns {Promise<boolean>}
 */
async function planTransitOnMap(orderedSpots) {
    await ensureTransferPlugin();

    const points = toLngLatPairs(orderedSpots);
    if (points.length < 2) return false;

    const origin = points[0];
    const destination = points[points.length - 1];
    const waypoints = points.slice(1, points.length - 1);

    currentTransit = new AMap.Transfer({
        map,
        // 不依赖城市名，让高德自动识别；若你只做单城，可在这里传 city
        policy: AMap.TransferPolicy.LEAST_TIME
    });

    return await new Promise((resolve) => {
        currentTransit.search(
            origin,
            destination,
            { waypoints },
            (status, result) => {
                resolve(status === 'complete' && !!result);
            }
        );
    });
}

/**
 * 绘制最优路线 + 标记 + 信息窗体（使用高德 Driving 规划的真实道路路线；失败则回退直线连线）。
 * @param {Array<{lng:number,lat:number,name:string,city?:string,province?:string,address?:string,description?:string,ticket?:string}>} optimalSpots
 * @returns {Promise<void>}
 */
async function drawOptimalRouteOnMap(optimalSpots) {
    clearMapOverlays();
    if (!optimalSpots.length) return;

    // 规划并绘制路线（按模式）
    try {
        if (currentRouteMode === 'transit') {
            const ok = await planTransitOnMap(optimalSpots);
            if (!ok) throw new Error('公交路线规划失败（可能跨城/无公交方案/Key 限制）');
        } else {
            const segments = currentRouteMode === 'walking'
                ? await planWalkingPaths(optimalSpots)
                : await planDrivingPaths(optimalSpots);

            if (segments.length) {
                segments.forEach(segPath => {
                    const polyline = new AMap.Polyline({
                        path: segPath,
                        strokeColor: "#FF8C42",
                        strokeWeight: 7,
                        strokeOpacity: 0.95,
                        lineJoin: 'round',
                        lineCap: 'round',
                        borderWeight: 2,
                        borderColor: "#FFF5E0",
                        zIndex: 15
                    });
                    currentDrivingPolylines.push(polyline);
                });
                map.add(currentDrivingPolylines);
            } else {
                throw new Error('路线规划返回空路径');
            }
        }
    } catch (e) {
        // 规划失败时回退为直线连线，保证一定有可视化结果
        const fallbackPath = optimalSpots.map(spot => [spot.lng, spot.lat]);
        currentPolyline = new AMap.Polyline({
            path: fallbackPath,
            strokeColor: "#FF8C42",
            strokeWeight: 6,
            strokeOpacity: 0.95,
            lineJoin: 'round',
            lineCap: 'round',
            borderWeight: 2,
            borderColor: "#FFF5E0",
            zIndex: 15
        });
        map.add(currentPolyline);
        console.warn(e);
        setLoadingTip(`⚠️ 路线规划失败，已使用直线连线替代：${e?.message || e}`);
        setTimeout(() => hideLoadingTip(), 2600);
    }

    // 添加标记，带序号和悬浮窗
    optimalSpots.forEach((spot, idx) => {
        const markerContent = `<div style="background:#ffaa33; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; color:#2d2f36; border: 2px solid white; box-shadow:0 2px 12px rgba(0,0,0,0.3);">${idx+1}</div>`;
        const marker = new AMap.Marker({
            position: [spot.lng, spot.lat],
            title: spot.name,
            content: markerContent,
            offset: new AMap.Pixel(-16, -16),
            zIndex: 20
        });
        // 信息窗口内容
        const infoHtml = `
            <div style="padding: 12px 16px; max-width: 260px;">
                <h4 style="color:#ff8c42; margin-bottom: 8px;">📍 ${spot.name}</h4>
                <p style="margin:4px 0; font-size:13px;">🏙️ ${spot.city} · ${spot.province}</p>
                <p style="margin:4px 0; font-size:12px; color:#555;">${spot.address || spot.description || ''}</p>
                <p style="margin:6px 0 0 0; font-size:12px;">🎫 ${spot.ticket || '详询景区'}</p>
                <small style="color:#888;">🔢 路线序号 ${idx+1}</small>
            </div>
        `;
        marker.on('click', () => {
            const infoWin = new AMap.InfoWindow({
                content: infoHtml,
                offset: new AMap.Pixel(0, -28)
            });
            infoWin.open(map, [spot.lng, spot.lat]);
        });
        map.add(marker);
        currentMarkers.push(marker);
    });

    // 自动调整视野到最优路径范围
    if (optimalSpots.length > 0) {
        setTimeout(() => {
            const fitTargets = [];
            if (currentDrivingPolylines.length) fitTargets.push(...currentDrivingPolylines);
            if (currentPolyline) fitTargets.push(currentPolyline);
            if (fitTargets.length) {
                map.setFitView(fitTargets, false, { padding: 60 });
            } else if (currentMarkers.length) {
                map.setFitView(currentMarkers, false, { padding: 60 });
            }
            map.render();
            // 某些情况下 setFitView/render 后会出现交互状态丢失，这里强制恢复一次
            enforceMapInteractions();
            installManualMapInteractionFallback();
        }, 200);
    }

    // 路线绘制完成后再兜底恢复交互，确保“从路线规划页跳转携参”场景可拖拽缩放
    setTimeout(() => {
        enforceMapInteractions();
        installManualMapInteractionFallback();
    }, 50);
}

/**
 * 在“路线规划页携参跳转”场景下，强制重建地图实例并重绘路线。
 * 用于兜底修复部分环境下绘制后地图交互失效的问题。
 * @param {Array<Object>} routeSpots
 * @returns {Promise<void>}
 */
async function hardResetMapAndRedraw(routeSpots) {
    if (hasHardResetAfterRouteLoad || !routeSpots?.length) return;
    hasHardResetAfterRouteLoad = true;
    setLoadingTip('🛠️ 正在重建地图交互内核 ...');

    try {
        if (map) {
            try {
                map.destroy();
            } catch (error) {
                // ignore
            }
            map = null;
        }
        const container = document.getElementById('map-container');
        if (container) {
            container.innerHTML = '';
        }
        await initMap();
        await drawOptimalRouteOnMap(routeSpots);
        updateRouteCard(routeSpots);
    } finally {
        hideLoadingTip();
    }
}

// 更新侧边卡片信息
function updateRouteCard(routeSpots) {
    const card = document.getElementById('route-sidecard');
    if (!routeSpots.length) {
        card.style.display = 'none';
        if (map) {
            setTimeout(() => {
                try {
                    map.resize();
                    enforceMapInteractions();
                } catch (e) {
                    // ignore
                }
            }, 0);
        }
        return;
    }
    card.style.display = 'block';
    const count = routeSpots.length;
    const totalDistKm = calcTotalDistance(routeSpots);
    const totalHours = estimateTime(routeSpots, totalDistKm);
    document.getElementById('spot-count').innerText = count;
    document.getElementById('total-dist').innerText = `${totalDistKm} km`;
    document.getElementById('total-time').innerText = `${totalHours} 小时`;
    const namesList = routeSpots.map((s, i) => `${i+1}.${s.name}`).join('  →  ');
    document.getElementById('route-order-list').innerHTML = `✨ 最优串联: ${namesList}`;

    // 关键修复：侧边卡片显示会改变地图容器尺寸，必须在该时机刷新地图尺寸与交互状态
    if (map) {
        setTimeout(() => {
            try {
                map.resize();
                enforceMapInteractions();
                installManualMapInteractionFallback();
            } catch (e) {
                // ignore
            }
        }, 0);
        setTimeout(() => {
            try {
                map.resize();
                enforceMapInteractions();
            } catch (e) {
                // ignore
            }
        }, 280);
    }
}

// 从URL获取景点ID并加载最优路径 (主流程)
async function loadRouteFromURL() {
    setLoadingTip('🧭 正在加载最优路径规划器 ...');

    if (window.__AMAP_LOAD_ERROR__) {
        setLoadingTip(`⚠️ ${window.__AMAP_LOAD_ERROR__}`);
        return;
    }

    try {
        await initMap();
    } catch (e) {
        setLoadingTip(`⚠️ 地图初始化失败：${e?.message || e}`);
        return;
    }

    const urlParams = new URLSearchParams(window.location.search);
    let spotIdsParam = urlParams.get('spotIds');

    // 如果没有传入景点参数，为了演示效果，默认展示一组经典景点（故宫、兵马俑、西湖、丽江等展示能力）
    let selectedSpots = [];
    if (spotIdsParam && spotIdsParam.trim() !== "") {
        const ids = spotIdsParam.split(',').map(id => parseInt(id)).filter(id => !isNaN(id));
        if (ids.length > 0) {
            selectedSpots = FULL_SPOTS_DB.filter(spot => ids.includes(spot.id));
        }
    }

    // 若没有有效参数，不显示初始路线
    if (selectedSpots.length === 0) {
        document.getElementById('loadingTip').style.display = 'none';
        document.getElementById('route-sidecard').style.display = 'none';
        return;
    }

    // 核心：计算最优路径顺序 (贪心最近邻)
    const optimalOrder = computeOptimalRoute(selectedSpots);
    currentRouteSpots = optimalOrder;

    // 绘制地图路线
    await drawOptimalRouteOnMap(optimalOrder);
    updateRouteCard(optimalOrder);
    rebindInteractionsForGeneratedRoute();

    // 仅在携带 spotIds 的跳转场景执行一次硬重置，兜底修复“绘制后无法拖拽缩放”
    if (spotIdsParam && spotIdsParam.trim() !== "") {
        await hardResetMapAndRedraw(optimalOrder);
        rebindInteractionsForGeneratedRoute();
        setTimeout(() => rebindInteractionsForGeneratedRoute(), 250);
    }

    // 隐藏loading
    hideLoadingTip();

    // 增加一个全局重置视野按钮
    const resetBtn = document.getElementById('reset-view');
    if (resetBtn) {
        resetBtn.onclick = () => {
            if (currentPolyline) {
                map.setFitView([currentPolyline], false, { padding: 55 });
            } else if (currentMarkers.length) {
                map.setFitView(currentMarkers);
            }
        };
    }

    // 增加生成旅游攻略按钮
    const guideBtn = document.getElementById('generate-guide');
    console.log('Guide button element:', guideBtn);
    console.log('Current route spots:', currentRouteSpots);
    if (guideBtn) {
        guideBtn.onclick = () => {
            console.log('Guide button clicked');
            console.log('Current route spots length:', currentRouteSpots.length);
            if (currentRouteSpots.length > 0) {
                const spotIds = currentRouteSpots.map(spot => spot.id).join(',');
                console.log('Redirecting to guide with spotIds:', spotIds);
                window.location.href = `/guide?spotIds=${spotIds}`;
            } else {
                alert('请先选择景点生成路线');
            }
        };
    }
}

// 添加路线额外优化: 在控制台输出提示, 并在窗口加载完毕后启动
window.onload = () => {
    // 路线类型切换：本页直接重新规划并绘制
    const modeSelect = document.getElementById('routeModeSelect');
    if (modeSelect) {
        modeSelect.addEventListener('change', async () => {
            currentRouteMode = modeSelect.value || 'driving';
            if (!currentRouteSpots?.length) return;
            setLoadingTip('🧭 正在切换路线类型并重新规划 ...');
            try {
                await drawOptimalRouteOnMap(currentRouteSpots);
            } finally {
                hideLoadingTip();
            }
        });
    }

    loadRouteFromURL().catch(err => {
        console.error(err);
        setLoadingTip(`⚠️ 地图加载异常：${err?.message || err}`);
        setTimeout(() => hideLoadingTip(), 2600);
    });

    window.addEventListener('resize', () => {
        if (!map) return;
        try {
            map.resize();
            enforceMapInteractions();
        } catch (e) {
            // ignore
        }
    });
};

// 暴露备用方法，用于动态刷新（如果以后页面内嵌选择器）
window.refreshRouteWithSpots = (spotIdsArray) => {
    const spots = FULL_SPOTS_DB.filter(s => spotIdsArray.includes(s.id));
    if(spots.length) {
        const newRoute = computeOptimalRoute(spots);
        currentRouteSpots = newRoute;
        drawOptimalRouteOnMap(newRoute);
        updateRouteCard(newRoute);
    }
};
</script>
