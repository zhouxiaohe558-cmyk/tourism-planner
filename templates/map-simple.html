            {id:42, name:"都江堰", city:"都江堰", province:"四川", lng:103.6153, lat:31.0080, description:"世界文化遗产古代水利工程"},
            {id:43, name:"青城山", city:"都江堰", province:"四川", lng:103.5849, lat:30.9947, description:"道教名山"},
            {id:44, name:"峨眉山", city:"乐山", province:"四川", lng:103.4352, lat:29.5871, description:"佛教名山"},
            {id:45, name:"乐山大佛", city:"乐山", province:"四川", lng:103.7799, lat:29.5451, description:"世界最大石刻坐佛"},
            {id:46, name:"稻城亚丁", city:"甘孜", province:"四川", lng:100.2201, lat:28.5292, description:"蓝色星球上最后一片净土"}
        ];

        let map = null;
        let currentRouteSpots = [];

        function computeRoute(spots) {
            if (spots.length <= 1) return spots;
            let unvisited = [...spots];
            let route = [unvisited.shift()];
            while (unvisited.length > 0) {
                let last = route[route.length - 1];
                let minDist = Infinity;
                let nearestIdx = 0;
                for (let i = 0; i < unvisited.length; i++) {
                    let dx = unvisited[i].lng - last.lng;
                    let dy = unvisited[i].lat - last.lat;
                    let d = Math.sqrt(dx * dx + dy * dy);
                    if (d < minDist) {
                        minDist = d;
                        nearestIdx = i;
                    }
                }
                route.push(unvisited.splice(nearestIdx, 1)[0]);
            }
            return route;
        }

        function initMap() {
            map = new AMap.Map("map-container");
            AMap.plugin(['AMap.Scale', 'AMap.ToolBar', 'AMap.Driving'], function() {
                map.addControl(new AMap.Scale());
                map.addControl(new AMap.ToolBar());
            });
        }

        function drawRoute(spots) {
            if (!spots.length) return;
            
            const path = spots.map(s => new AMap.LngLat(s.lng, s.lat));
            
            const polyline = new AMap.Polyline({
                path: path,
                strokeColor: "#FF8C42",
                strokeWeight: 5
            });
            map.add(polyline);

            spots.forEach((spot, idx) => {
                const marker = new AMap.Marker({
                    position: [spot.lng, spot.lat],
                    title: `${idx + 1}. ${spot.name}`,
                    label: {
                        content: `<div style="background:#ffaa33; color:#fff; padding:2px 8px; border-radius:10px; font-weight:bold;">${idx + 1}</div>`,
                        offset: [0, -30]
                    }
                });
                marker.on('click', function() {
                    new AMap.InfoWindow({
                        content: `<div style="padding:8px;"><b>${spot.name}</b><br/>${spot.city} · ${spot.province}<br/>${spot.description || ''}</div>`
                    }).open(map, [spot.lng, spot.lat]);
                });
                map.add(marker);
            });

            map.setFitView();
        }

        function drawRealRoute(spots) {
            if (!spots.length) return;

            document.querySelector('.loading-text').textContent = '正在规划真实路线...';

            const driving = new AMap.Driving({
                map: map,
                showTraffic: false,
                hideMarkers: true
            });

            const points = spots.map(s => new AMap.LngLat(s.lng, s.lat));
            
            const waypoints = points.slice(1, points.length - 1);
            const origin = points[0];
            const destination = points[points.length - 1];

            driving.search(origin, destination, { waypoints: waypoints }, function(status, result) {
                if (status === 'complete') {
                    console.log('路线规划成功');
                    
                    spots.forEach((spot, idx) => {
                        const marker = new AMap.Marker({
                            position: [spot.lng, spot.lat],
                            title: `${idx + 1}. ${spot.name}`,
                            label: {
                                content: `<div style="background:#ffaa33; color:#fff; padding:2px 8px; border-radius:10px; font-weight:bold;">${idx + 1}</div>`,
                                offset: [0, -30]
                            }
                        });
                        marker.on('click', function() {
                            new AMap.InfoWindow({
                                content: `<div style="padding:8px;"><b>${spot.name}</b><br/>${spot.city} · ${spot.province}<br/>${spot.description || ''}</div>`
                            }).open(map, [spot.lng, spot.lat]);
                        });
                        map.add(marker);
                    });

                    document.getElementById('loadingOverlay').classList.add('hidden');
                    document.getElementById('guideBtn').style.display = 'block';
                } else {
                    console.log('路线规划失败，使用直线');
                    drawRoute(spots);
                }
            });
        }

        function goBack() {
            window.location.href = '/route';
        }

        function goToGuide() {
            if (currentRouteSpots.length > 0) {
                const spotIds = currentRouteSpots.map(s => s.id).join(',');
                window.location.href = '/guide?spotIds=' + spotIds;
            }
        }

        function loadSpots() {
            const params = new URLSearchParams(window.location.search);
            const ids = params.get('spotIds');
            
            if (!ids) {
                document.querySelector('.loading-text').textContent = '没有景点参数';
                setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 2000);
                return;
            }

            const selectedIds = ids.split(',').map(Number);
            const spots = SPOTS_DB.filter(s => selectedIds.includes(s.id));
            
            if (!spots.length) {
                document.querySelector('.loading-text').textContent = '未找到对应景点';
                setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 2000);
                return;
            }

            currentRouteSpots = computeRoute(spots);
            drawRealRoute(currentRouteSpots);
            document.getElementById('guideBtn').style.display = 'block';
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        window.onload = function() {
            initMap();
            setTimeout(loadSpots, 300);
        };
    </script>
</body>
</html>
